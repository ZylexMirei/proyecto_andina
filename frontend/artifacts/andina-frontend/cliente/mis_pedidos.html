<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0f1e">
  <style>html{background:#0a0f1e}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos — Distribuidora Andina SRL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../assets/css/custom.css" rel="stylesheet">
  <style>
    body {
      background: #0a0f1e;
      background-image:
        radial-gradient(ellipse 70% 40% at 10% 0%, rgba(37,99,235,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(0,168,89,0.04) 0%, transparent 60%);
      background-attachment: fixed;
      color: #e2e8f0;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
    }

    /* NAV */
    .client-nav {
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 28px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nav-brand { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; color:#fff; }
    .nav-brand .accent { background:linear-gradient(135deg,#00c6ff,#38ef7d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    /* PAGE */
    .page-title { font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:26px; color:#f1f5f9; letter-spacing:-0.5px; }
    .page-title i { color:#00c6ff; }

    /* FILTER TABS */
    .filter-tab {
      padding: 8px 18px; border-radius: 30px; font-family:'Space Grotesk',sans-serif;
      font-weight:600; font-size:13px; cursor:pointer; transition:all .2s; border:1px solid rgba(255,255,255,0.08);
      background: #111827; color: #64748b;
    }
    .filter-tab:hover { background:#1e293b; color:#94a3b8; }
    .filter-tab.active { background:linear-gradient(135deg,rgba(0,198,255,0.18),rgba(56,239,125,0.08)); color:#00c6ff; border-color:rgba(0,198,255,0.3); }

    /* PEDIDO CARD */
    .pedido-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; overflow:hidden;
      margin-bottom: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.2);
      animation: fadeInUp .35s ease both;
    }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    .pedido-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(135deg,#0f172a,#131c30);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .pedido-code { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; color:#00c6ff; }
    .pedido-date { font-size:12px; color:#475569; margin-top:2px; }
    .pedido-body { padding: 18px 20px; }

    /* TABLE */
    .pedido-table { width:100%; border-collapse:collapse; margin-bottom:14px; }
    .pedido-table th { font-size:11px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:.5px; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .pedido-table td { padding:10px 10px; font-size:13.5px; color:#94a3b8; border-bottom:1px solid rgba(255,255,255,0.04); }
    .pedido-table tbody tr:last-child td { border-bottom:none; }
    .pedido-table tfoot td { padding-top:12px; font-size:14px; color:#64748b; border-top:1px solid rgba(255,255,255,0.07); }
    .pedido-total { font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:18px; color:#38ef7d; }
    .payment-pill { display:inline-flex; align-items:center; gap:5px; margin-top:6px; padding:5px 9px; border-radius:999px; border:1px solid rgba(0,198,255,.18); background:rgba(0,198,255,.08); color:#00c6ff; font-size:11.5px; font-weight:700; }

    /* DELIVERY INFO */
    .delivery-info { font-size:12.5px; color:#475569; display:flex; align-items:center; gap:6px; }
    .delivery-info strong { color:#94a3b8; }

    /* STATUS BADGES */
    .badge-pendiente { background:rgba(245,158,11,0.12); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:6px; }
    .badge-transito { background:rgba(0,198,255,0.1); color:#00c6ff; border:1px solid rgba(0,198,255,0.2); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:6px; }
    .badge-completado { background:rgba(56,239,125,0.1); color:#38ef7d; border:1px solid rgba(56,239,125,0.2); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:6px; }
    .badge-cancelado { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:6px; }

    /* ACTION BUTTONS */
    .btn-action { padding:7px 14px; border-radius:8px; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:12.5px; cursor:pointer; transition:all .2s; border:1px solid; display:inline-flex; align-items:center; gap:6px; background:transparent; }
    .btn-action-success { border-color:rgba(56,239,125,0.25); color:#38ef7d; }
    .btn-action-success:hover { background:rgba(56,239,125,0.08); }
    .btn-action-danger { border-color:rgba(239,68,68,0.25); color:#f87171; }
    .btn-action-danger:hover { background:rgba(239,68,68,0.08); }
    .btn-action-primary { border-color:rgba(0,198,255,0.25); color:#00c6ff; }
    .btn-action-primary:hover { background:rgba(0,198,255,0.08); }

    /* NAV BUTTONS */
    .btn-outline-primary { border-color:rgba(0,198,255,0.3); color:#00c6ff; background:transparent; }
    .btn-outline-primary:hover { background:rgba(0,198,255,0.1); border-color:#00c6ff; color:#00c6ff; }
    .btn-outline-secondary { border-color:rgba(255,255,255,0.1); color:#64748b; background:transparent; }
    .btn-outline-secondary:hover { background:rgba(255,255,255,0.05); color:#94a3b8; }

    /* EMPTY */
    .empty-icon { font-size:56px; color:#1e293b; }
    .empty-title { color:#334155; font-family:'Space Grotesk',sans-serif; }

    /* BTN NUEVO */
    .btn-nuevo { background:linear-gradient(135deg,#00a859,#00c6ff); border:none; color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:700; padding:10px 22px; border-radius:10px; cursor:pointer; transition:all .2s; font-size:14px; display:inline-flex; align-items:center; gap:8px; box-shadow:0 4px 16px rgba(0,168,89,0.2); }
    .btn-nuevo:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(0,168,89,0.3); }
  </style>
</head>
<body>

<nav class="client-nav">
  <a href="tienda.html" class="d-flex align-items-center gap-3 text-decoration-none">
    <div style="width:38px;height:38px;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <div style="position:absolute;inset:0;border-radius:10px;background:linear-gradient(#0a0f1e,#0a0f1e) padding-box,linear-gradient(135deg,#00c6ff,#38ef7d) border-box;border:2px solid transparent;box-shadow:0 0 12px rgba(0,198,255,0.18);"></div>
      <span style="position:relative;z-index:1;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;background:linear-gradient(135deg,#00c6ff,#38ef7d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">DA</span>
    </div>
    <span class="nav-brand">Distribuidora <span class="accent">Andina</span></span>
  </a>
  <div class="flex-grow-1"></div>
  <a href="tienda.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-shop me-1"></i>Tienda</a>
  <a href="perfil.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-person me-1"></i>Mi perfil</a>
  <a href="carrito.html" class="btn btn-success btn-sm"><i class="bi bi-cart3 me-1"></i>Carrito</a>
</nav>

<div class="container py-5" style="max-width:920px;">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <h2 class="page-title mb-0"><i class="bi bi-receipt me-2"></i>Mis Pedidos</h2>
    <a href="tienda.html" class="btn-nuevo"><i class="bi bi-cart-plus"></i>Nuevo pedido</a>
  </div>

  <!-- Filtros -->
  <div class="d-flex gap-2 mb-4 flex-wrap">
    <button class="filter-tab active" data-estado="" onclick="filtrarPedidos(this,'')">Todos</button>
    <button class="filter-tab" data-estado="Pendiente" onclick="filtrarPedidos(this,'Pendiente')"><i class="bi bi-clock me-1"></i>Pendientes</button>
    <button class="filter-tab" data-estado="En tránsito" onclick="filtrarPedidos(this,'En tránsito')"><i class="bi bi-truck me-1"></i>En tránsito</button>
    <button class="filter-tab" data-estado="Completado" onclick="filtrarPedidos(this,'Completado')"><i class="bi bi-check-circle me-1"></i>Completados</button>
  </div>

  <div id="pedidosContainer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/carrito.js"></script>
<script>
const session = Andina.requireClienteAuth();
if(!session) throw new Error('no session');

let pedidosCliente = [];

async function cargarPedidos() {
  try {
    const data = await Andina.apiRequest('obtener_pedidos_cliente');
    pedidosCliente = (data || []).sort((a,b) => {
      const fechaCmp = String(b.fecha || '').localeCompare(String(a.fecha || ''));
      return fechaCmp || (Number(b.id || 0) - Number(a.id || 0));
    });
    renderPedidos(pedidosCliente);
  } catch (error) {
    console.error("Error al cargar pedidos:", error);
    Andina.showToast('Error de conexión al obtener pedidos', 'error');
  }
}

function getEstadoBadge(estado) {
  const map = {
    'Pendiente': `<span class="badge-pendiente"><i class="bi bi-clock"></i>${estado}</span>`,
    'En tránsito': `<span class="badge-transito"><i class="bi bi-truck"></i>${estado}</span>`,
    'Completado': `<span class="badge-completado"><i class="bi bi-check-circle"></i>${estado}</span>`,
    'Cancelado': `<span class="badge-cancelado"><i class="bi bi-x-circle"></i>${estado}</span>`,
  };
  return map[estado] || `<span class="badge-pendiente">${estado}</span>`;
}

function renderPedidos(filtrado) {
  const c = document.getElementById('pedidosContainer');
  if(!filtrado.length){
    c.innerHTML=`<div class="text-center py-5">
      <i class="bi bi-inbox empty-icon"></i>
      <h5 class="mt-3 empty-title">No tienes pedidos en este estado</h5>
      <a href="tienda.html" class="btn-nuevo mt-3 d-inline-flex"><i class="bi bi-shop"></i>Ir a comprar</a>
    </div>`;
    return;
  }
  c.innerHTML = filtrado.map((p,idx) => `
    <div class="pedido-card" style="animation-delay:${idx*0.06}s">
      <div class="pedido-header">
        <div>
          <div class="pedido-code">${p.codigo}</div>
          <div class="pedido-date"><i class="bi bi-calendar3 me-1"></i>${Andina.formatFecha(p.fecha)}</div>
          <div class="payment-pill"><i class="bi bi-credit-card-2-front"></i>${p.metodo_pago || 'No registrado'}</div>
        </div>
        ${getEstadoBadge(p.estado)}
      </div>
      <div class="pedido-body">
        <table class="pedido-table">
          <thead><tr>
            <th>Producto</th>
            <th class="text-center">Cantidad</th>
            <th class="text-end">Precio u.</th>
            <th class="text-end">Subtotal</th>
          </tr></thead>
          <tbody>${p.items.map(i=>`<tr>
            <td style="color:#e2e8f0;">${i.nombre}</td>
            <td class="text-center">${i.cantidad}</td>
            <td class="text-end">${Andina.formatBs(i.precio)}</td>
            <td class="text-end" style="color:#e2e8f0;font-weight:600;">${Andina.formatBs(i.precio*i.cantidad)}</td>
          </tr>`).join('')}</tbody>
          <tfoot><tr>
            <td colspan="3" class="text-end" style="color:#64748b;font-weight:600;">Total pedido</td>
            <td class="text-end"><span class="pedido-total">${Andina.formatBs(p.total)}</span></td>
          </tr></tfoot>
        </table>
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div class="delivery-info"><i class="bi bi-calendar-check"></i>Entrega estimada: <strong>${p.entrega_est}</strong></div>
          <div class="d-flex gap-2 flex-wrap">
            ${p.estado==='Completado' ? `<button class="btn-action btn-action-success" onclick="reordenar(${p.id})"><i class="bi bi-arrow-repeat"></i>Volver a pedir</button>` : ''}
            ${p.estado==='Pendiente' ? `<button class="btn-action btn-action-danger" onclick="cancelar(${p.id})"><i class="bi bi-x-circle"></i>Cancelar</button>` : ''}
            <button class="btn-action btn-action-primary" onclick="verFactura(${p.id})"><i class="bi bi-file-earmark-pdf"></i>Factura</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function filtrarPedidos(btn, estado) {
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPedidos(estado ? pedidosCliente.filter(p=>p.estado===estado) : pedidosCliente);
}

function reordenar(id) {
  const p = pedidosCliente.find(x=>x.id===id);
  p.items.forEach(i=>Carrito.agregar({id:Math.random(),nombre:i.nombre,precio:i.precio,categoria:'—',stock:99,cantidad:i.cantidad}));
  Andina.showToast('Productos agregados al carrito','success');
  setTimeout(()=>window.location.href='carrito.html',900);
}

function cancelar(id) {
  Swal.fire({
    title:'¿Cancelar pedido?', text:'El pedido será cancelado.',
    icon:'warning', showCancelButton:true,
    confirmButtonText:'Sí, cancelar', cancelButtonText:'No',
    confirmButtonColor:'#ef4444', cancelButtonColor:'#1e293b',
    background:'#111827', color:'#e2e8f0'
  }).then(async r=>{
    if(!r.isConfirmed) return;
    const res = await Andina.apiRequest('cancelar_pedido_cliente', { id_pedido: id });
    if(res && res.exito !== false) {
      const pedido = pedidosCliente.find(x => x.id === id);
      if(pedido) pedido.estado = 'Cancelado';
      renderPedidos(pedidosCliente);
      Andina.showToast('Pedido cancelado','success');
    } else {
      Andina.showToast(res?.error || 'No se pudo cancelar el pedido','error');
    }
  });
}

function verFactura(id) {
  const p = pedidosCliente.find(x=>x.id===id);
  if(!p) return;
  Swal.fire({
    title:'Factura ' + p.codigo,
    html:`<div style="font-size:13px;text-align:left;color:#94a3b8;">
      <strong style="color:#e2e8f0;">Distribuidora Andina SRL</strong><br>
      NIT: 1234567890<br>Santa Cruz de la Sierra, Bolivia<br><br>
      <strong style="color:#e2e8f0;">Cliente:</strong> ${session.nombre}<br>
      <strong style="color:#e2e8f0;">Fecha:</strong> ${Andina.formatFecha(p.fecha)}<br>
      <strong style="color:#e2e8f0;">Metodo de pago:</strong> ${p.metodo_pago || 'No registrado'}<br>
      <strong style="color:#e2e8f0;">Estado:</strong> ${p.estado || 'Pendiente'}<br><br>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
          <th style="padding:6px 0;color:#64748b;font-size:11px;text-transform:uppercase;">Producto</th>
          <th style="padding:6px 0;color:#64748b;font-size:11px;text-transform:uppercase;text-align:center;">Cant.</th>
          <th style="padding:6px 0;color:#64748b;font-size:11px;text-transform:uppercase;text-align:right;">Total</th>
        </tr></thead>
        <tbody>${p.items.map(i=>`<tr>
          <td style="padding:6px 0;">${i.nombre}</td>
          <td style="padding:6px 0;text-align:center;">${i.cantidad}</td>
          <td style="padding:6px 0;text-align:right;color:#38ef7d;">${Andina.formatBs(i.precio*i.cantidad)}</td>
        </tr>`).join('')}</tbody>
      </table><br>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong style="color:#38ef7d;font-size:16px;">Total: ${Andina.formatBs(p.total)}</strong>
        <button type="button" onclick="imprimirFactura(${p.id}); return false;" style="background:linear-gradient(135deg,#00a859,#00c6ff); border:none; color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:600; padding:6px 14px; border-radius:6px; cursor:pointer; transition:all 0.2s;"><i class="bi bi-file-earmark-pdf me-1"></i> Descargar PDF</button>
      </div>
    </div>`,
    showConfirmButton:true,
    confirmButtonText:'Cerrar',
    showCloseButton:true,
    allowOutsideClick:true,
    allowEscapeKey:true,
    focusConfirm:false,
    confirmButtonColor:'#1e293b',
    background:'#111827', color:'#e2e8f0'
  });
}

function imprimirFactura(id) {
  const p = pedidosCliente.find(x=>x.id===id);
  if(!p) return;

  Swal.close();
  
  // Crear ventana para renderizar el PDF limpio
  const w = window.open('', '_blank');
  if (!w) {
    Andina.showToast('Permite ventanas emergentes para descargar la factura', 'warning');
    return;
  }
  w.document.write(`
    <html><head><title>Factura_${p.codigo}</title>
    <style>
      body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.5; }
      .header { border-bottom: 2px solid #00a859; padding-bottom: 20px; margin-bottom: 20px; text-align: center; }
      .header h1 { margin: 0; color: #00a859; font-size: 28px; }
      .info { margin-bottom: 30px; display: flex; justify-content: space-between; font-size: 14px; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
      th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
      th { background: #f8f9fa; font-weight: bold; color: #444; }
      .text-right { text-align: right; }
      .text-center { text-align: center; }
      .total { font-size: 24px; font-weight: bold; color: #00a859; text-align: right; }
      .footer { text-align: center; font-size: 12px; color: #888; margin-top: 50px; border-top: 1px solid #ddd; padding-top: 20px; }
      @media print { body { padding: 0; } }
    </style>
    </head><body>
      <div class="header">
        <h1>Distribuidora Andina SRL</h1>
        <p>NIT: 1234567890 | Santa Cruz de la Sierra, Bolivia</p>
        <h2 style="margin-bottom:0;">FACTURA COMERCIAL</h2>
      </div>
      <div class="info">
        <div>
          <strong>Cliente:</strong> ${session.nombre}<br>
          <strong>Nro. Pedido:</strong> ${p.codigo}
        </div>
        <div class="text-right">
          <strong>Fecha:</strong> ${Andina.formatFecha(p.fecha)}<br>
          <strong>Metodo:</strong> ${p.metodo_pago || 'No registrado'}<br>
          <strong>Estado:</strong> ${p.estado || 'Pendiente'}
        </div>
      </div>
      <table>
        <thead><tr>
          <th>Producto</th>
          <th class="text-center">Cant.</th>
          <th class="text-right">Precio Unit.</th>
          <th class="text-right">Subtotal</th>
        </tr></thead>
        <tbody>
          ${p.items.map(i=>`<tr><td>${i.nombre}</td><td class="text-center">${i.cantidad}</td><td class="text-right">${Andina.formatBs(i.precio)}</td><td class="text-right">${Andina.formatBs(i.precio*i.cantidad)}</td></tr>`).join('')}
        </tbody>
      </table>
      <div class="total">TOTAL A PAGAR: ${Andina.formatBs(p.total)}</div>
      <div class="footer">Esta es una representación impresa de su recibo de compra en línea.<br>¡Gracias por su preferencia!</div>
      <script>
        window.onload = () => {
          window.focus();
          window.print();
        };
      <\/script>
    </body></html>
  `);
  w.document.close();
}

cargarPedidos();
</script>
<script src="../assets/js/transitions.js"></script>
</body>
</html>
