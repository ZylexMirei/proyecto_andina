<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0f1e">
  <style>html{background:#0a0f1e}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — Distribuidora Andina SRL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../assets/css/custom.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #f0f4f8 0%, #e8f0fe 100%); min-height:100vh; }
    .reg-card { max-width:520px; margin:40px auto; background:#fff; border-radius:20px; padding:40px; box-shadow:0 8px 40px rgba(26,58,92,0.12); }
    .reg-header { text-align:center; margin-bottom:32px; }
    .reg-logo { width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 4px 16px rgba(0,168,89,0.3); }
    .benefit-item { display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:#4a5568; }
    .benefit-item i { color:var(--accent);font-size:16px; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="reg-card">
        <div class="reg-header">
          <div class="reg-logo"><i class="bi bi-bag-check"></i></div>
          <h1 style="font-size:22px;color:var(--primary);font-family:'Poppins',sans-serif;font-weight:700;">Crea tu cuenta</h1>
          <p style="font-size:13.5px;color:#718096;margin:0;">Distribuidora Andina SRL · Tienda en línea</p>
        </div>

        <div class="row g-2 mb-4">
          <div class="col-12"><div class="benefit-item"><i class="bi bi-check-circle-fill"></i>Accede al catálogo completo con precios exclusivos</div></div>
          <div class="col-12"><div class="benefit-item"><i class="bi bi-check-circle-fill"></i>Realiza pedidos en línea 24/7</div></div>
          <div class="col-12"><div class="benefit-item"><i class="bi bi-check-circle-fill"></i>Historial completo de tus compras</div></div>
        </div>

        <form id="regClienteForm" novalidate>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Nombre completo / Razón social *</label>
              <input type="text" class="form-control" id="rcNombre" placeholder="Tu nombre o el de tu negocio" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email *</label>
              <input type="email" class="form-control" id="rcEmail" placeholder="tu@email.com" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="rcTel" placeholder="7xxxxxxx">
            </div>
            <div class="col-12">
              <label class="form-label">Dirección de entrega</label>
              <input type="text" class="form-control" id="rcDir" placeholder="Calle, número, barrio, ciudad">
            </div>
            <div class="col-md-6">
              <label class="form-label">Contraseña *</label>
              <div class="input-group">
                <input type="password" class="form-control" id="rcPass" placeholder="Mínimo 8 caracteres" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePass('rcPass','rc1Eye')"><i class="bi bi-eye" id="rc1Eye"></i></button>
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Confirmar contraseña *</label>
              <div class="input-group">
                <input type="password" class="form-control" id="rcPass2" placeholder="Repite la contraseña" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePass('rcPass2','rc2Eye')"><i class="bi bi-eye" id="rc2Eye"></i></button>
              </div>
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rcTerminos" required>
                <label class="form-check-label" for="rcTerminos" style="font-size:12.5px;">Acepto los <a href="#" class="text-success">términos y condiciones</a> de compra</label>
              </div>
            </div>
          </div>

          <div id="rcError" class="alert alert-danger d-none mt-3"></div>

          <button type="submit" class="btn btn-success w-100 py-2 mt-3" id="rcBtn">
            <span id="rcBtnTxt"><i class="bi bi-person-check me-2"></i>Crear mi cuenta</span>
            <span id="rcBtnLoad" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Registrando...</span>
          </button>
        </form>

        <div class="text-center mt-4">
          <p style="font-size:13px;color:#718096;">¿Ya tienes cuenta? <a href="../index.html" class="text-success fw-semibold">Inicia sesión</a></p>
          <p style="font-size:13px;color:#718096;">¿Eres empleado? <a href="../registro.html" style="color:var(--primary);">Registrarte aquí</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function togglePass(id,iconId){const el=document.getElementById(id);const ic=document.getElementById(iconId);el.type=el.type==='password'?'text':'password';ic.className=el.type==='password'?'bi bi-eye':'bi bi-eye-slash';}

document.getElementById('regClienteForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const nombre=document.getElementById('rcNombre').value.trim();
  const email=document.getElementById('rcEmail').value.trim();
  const pass=document.getElementById('rcPass').value;
  const pass2=document.getElementById('rcPass2').value;
  const terminos=document.getElementById('rcTerminos').checked;
  const errEl=document.getElementById('rcError');

  if(!nombre||!email||!pass){errEl.textContent='Completa los campos requeridos.';errEl.classList.remove('d-none');return;}
  if(pass!==pass2){errEl.textContent='Las contraseñas no coinciden.';errEl.classList.remove('d-none');return;}
  if(pass.length<8){errEl.textContent='La contraseña debe tener al menos 8 caracteres.';errEl.classList.remove('d-none');return;}
  if(!terminos){errEl.textContent='Acepta los términos y condiciones.';errEl.classList.remove('d-none');return;}
  errEl.classList.add('d-none');

  document.getElementById('rcBtnTxt').classList.add('d-none');
  document.getElementById('rcBtnLoad').classList.remove('d-none');
  document.getElementById('rcBtn').disabled=true;

  await Andina.apiRequest('registro_cliente',{nombre,email,telefono:document.getElementById('rcTel').value,direccion:document.getElementById('rcDir').value,password:pass,id_rol:4});
  localStorage.setItem('andina_otp_email',email);
  localStorage.setItem('andina_otp_nombre',nombre);

  document.getElementById('rcBtnTxt').classList.remove('d-none');
  document.getElementById('rcBtnLoad').classList.add('d-none');
  document.getElementById('rcBtn').disabled=false;
  Andina.showToast('Cuenta creada. Verifica tu email.','success');
  setTimeout(()=>window.location.href='../verificar.html',1200);
});
</script>
<script src="../assets/js/transitions.js"></script>
</body>
</html>
