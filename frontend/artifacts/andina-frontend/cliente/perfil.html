<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0f1e">
  <style>html{background:#0a0f1e}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — Distribuidora Andina SRL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../assets/css/custom.css" rel="stylesheet">
  <style>
    body {
      background: #0a0f1e;
      background-image:
        radial-gradient(ellipse 70% 40% at 10% 0%, rgba(37,99,235,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(0,168,89,0.04) 0%, transparent 60%);
      background-attachment: fixed;
      color: #e2e8f0;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
    }

    /* NAV */
    .client-nav {
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 28px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nav-brand { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; color:#fff; }
    .nav-brand .accent { background:linear-gradient(135deg,#00c6ff,#38ef7d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    /* PAGE */
    .page-title { font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:26px; color:#f1f5f9; letter-spacing:-0.5px; }
    .page-title i { color:#00c6ff; }

    /* AVATAR CARD */
    .avatar-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 32px 24px; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .avatar-circle {
      width: 84px; height: 84px; border-radius: 50%;
      background: linear-gradient(135deg,#00c6ff,#38ef7d);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:800; color:#0a0f1e;
      box-shadow: 0 0 28px rgba(0,198,255,0.3);
    }
    .avatar-nombre { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; color:#f1f5f9; margin-bottom:4px; }
    .avatar-email { font-size:12.5px; color:#475569; margin-bottom:14px; }
    .badge-cliente { background:rgba(0,198,255,0.1); color:#00c6ff; border:1px solid rgba(0,198,255,0.2); border-radius:20px; padding:4px 14px; font-size:12px; font-weight:600; }
    .member-since { font-size:12.5px; color:#475569; margin-top:14px; margin-bottom:4px; }
    .member-date { font-weight:700; color:#00c6ff; font-size:14px; }

    /* STATS */
    .stat-box {
      background: #0f172a; border:1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 14px 10px; text-align: center;
    }
    .stat-val { font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:20px; color:#e2e8f0; }
    .stat-val.green { color:#38ef7d; }
    .stat-label { font-size:11px; color:#475569; margin-top:2px; }

    /* FORM CARDS */
    .form-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; overflow:hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.2);
      margin-bottom: 18px;
    }
    .form-card-header {
      background: linear-gradient(135deg,#0f172a,#162035);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 20px;
      font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px;
      color:#64748b; text-transform:uppercase; letter-spacing:.7px;
    }
    .form-card-header i { color:#00c6ff; }
    .form-card-body { padding: 22px; }

    /* INPUTS */
    .form-label { font-size:11px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:.5px; margin-bottom:7px; }
    .form-control, .form-select {
      background: #131c30 !important;
      border: 1.5px solid rgba(255,255,255,0.08) !important;
      color: #e2e8f0 !important;
      border-radius: 10px !important;
      font-family:'Space Grotesk',sans-serif !important;
      font-size:14px !important; padding:11px 14px !important;
    }
    .form-control::placeholder { color:#334155; }
    .form-control:focus, .form-select:focus {
      border-color: rgba(0,198,255,0.4) !important;
      box-shadow: 0 0 0 3px rgba(0,198,255,0.08) !important;
      background: #162035 !important; outline:none !important;
    }
    .form-select option { background:#131c30; color:#e2e8f0; }

    /* BUTTONS */
    .btn-save {
      background: linear-gradient(135deg,#00a859,#00c6ff);
      border:none; color:#fff; font-family:'Space Grotesk',sans-serif;
      font-weight:700; padding:11px 24px; border-radius:10px;
      cursor:pointer; transition:all .2s; font-size:14px;
      box-shadow:0 4px 16px rgba(0,168,89,0.2);
      display:inline-flex; align-items:center; gap:8px;
    }
    .btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(0,168,89,0.3); }
    .btn-pass {
      background: transparent; border:1px solid rgba(0,198,255,0.25);
      color:#00c6ff; font-family:'Space Grotesk',sans-serif; font-weight:600;
      padding:10px 22px; border-radius:10px; cursor:pointer; transition:all .2s;
      font-size:14px; display:inline-flex; align-items:center; gap:8px;
    }
    .btn-pass:hover { background:rgba(0,198,255,0.08); border-color:rgba(0,198,255,0.4); }

    /* NAV BUTTONS */
    .btn-outline-primary { border-color:rgba(0,198,255,0.3); color:#00c6ff; background:transparent; }
    .btn-outline-primary:hover { background:rgba(0,198,255,0.1); border-color:#00c6ff; color:#00c6ff; }
    .btn-outline-secondary { border-color:rgba(255,255,255,0.1); color:#64748b; background:transparent; }
    .btn-outline-secondary:hover { background:rgba(255,255,255,0.05); color:#94a3b8; }
    .btn-outline-danger { border-color:rgba(239,68,68,0.3); color:#f87171; background:transparent; }
    .btn-outline-danger:hover { background:rgba(239,68,68,0.08); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="client-nav">
  <a href="tienda.html" class="d-flex align-items-center gap-3 text-decoration-none">
    <div style="width:38px;height:38px;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <div style="position:absolute;inset:0;border-radius:10px;background:linear-gradient(#0a0f1e,#0a0f1e) padding-box,linear-gradient(135deg,#00c6ff,#38ef7d) border-box;border:2px solid transparent;box-shadow:0 0 12px rgba(0,198,255,0.18);"></div>
      <span style="position:relative;z-index:1;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;background:linear-gradient(135deg,#00c6ff,#38ef7d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">DA</span>
    </div>
    <span class="nav-brand">Distribuidora <span class="accent">Andina</span></span>
  </a>
  <div class="flex-grow-1"></div>
  <a href="tienda.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-shop me-1"></i>Tienda</a>
  <a href="mis_pedidos.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-receipt me-1"></i>Mis pedidos</a>
  <button class="btn btn-outline-danger btn-sm" onclick="Andina.logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
</nav>

<div class="container py-5" style="max-width:860px;">
  <h2 class="page-title mb-4"><i class="bi bi-person-circle me-2"></i>Mi Perfil</h2>

  <div class="row g-4">
    <!-- Avatar -->
    <div class="col-md-4">
      <div class="avatar-card">
        <div class="avatar-circle" id="avatarCircle"></div>
        <div class="avatar-nombre" id="profileNombre">—</div>
        <div class="avatar-email" id="profileEmail">—</div>
        <span class="badge-cliente">Cliente</span>
        <div class="member-since">Miembro desde</div>
        <div class="member-date">Abril 2026</div>
        <div class="row g-2 mt-4">
          <div class="col-6">
            <div class="stat-box">
              <div class="stat-val">3</div>
              <div class="stat-label">Pedidos</div>
            </div>
          </div>
          <div class="col-6">
            <div class="stat-box">
              <div class="stat-val green">Bs. 269</div>
              <div class="stat-label">Compras</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Formularios -->
    <div class="col-md-8">
      <!-- Info personal -->
      <div class="form-card">
        <div class="form-card-header"><i class="bi bi-person-fill me-2"></i>Información personal</div>
        <div class="form-card-body">
          <form id="perfilForm">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Nombre completo / Razón social</label>
                <input type="text" class="form-control" id="pNombre">
              </div>
              <div class="col-md-6">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="pEmail">
              </div>
              <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="tel" class="form-control" id="pTel" placeholder="7xxxxxxx">
              </div>
              <div class="col-12">
                <label class="form-label">Dirección de entrega principal</label>
                <input type="text" class="form-control" id="pDir" placeholder="Av. o calle, número, barrio, ciudad">
              </div>
              <div class="col-md-6">
                <label class="form-label">Ciudad</label>
                <select class="form-select" id="pCiudad">
                  <option>Santa Cruz</option><option>La Paz</option><option>Cochabamba</option>
                  <option>Oruro</option><option>Potosí</option><option>Sucre</option><option>Tarija</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">NIT / CI</label>
                <input type="text" class="form-control" id="pNit" placeholder="123456789">
              </div>
            </div>
            <button type="submit" class="btn-save mt-4">
              <i class="bi bi-save"></i>Guardar cambios
            </button>
          </form>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-card">
        <div class="form-card-header"><i class="bi bi-lock me-2"></i>Cambiar contraseña</div>
        <div class="form-card-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Contraseña actual</label>
              <input type="password" class="form-control" id="passActual" placeholder="••••••••">
            </div>
            <div class="col-md-6">
              <label class="form-label">Nueva contraseña</label>
              <input type="password" class="form-control" id="passNueva" placeholder="••••••••">
            </div>
            <div class="col-md-6">
              <label class="form-label">Confirmar nueva contraseña</label>
              <input type="password" class="form-control" id="passConfirm" placeholder="••••••••">
            </div>
          </div>
          <button type="button" class="btn-pass mt-4" onclick="cambiarPass()">
            <i class="bi bi-key"></i>Cambiar contraseña
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const session = Andina.requireClienteAuth();
if(!session) throw new Error('no session');

const initials = session.nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
document.getElementById('avatarCircle').textContent = initials;
document.getElementById('profileNombre').textContent = session.nombre;
document.getElementById('profileEmail').textContent = session.email;

// Cargar datos en el formulario
document.getElementById('pNombre').value = session.nombre || '';
document.getElementById('pEmail').value = session.email || '';
document.getElementById('pTel').value = session.telefono || '';
document.getElementById('pDir').value = session.direccion || '';
document.getElementById('pNit').value = session.nit_ci || '';

document.getElementById('perfilForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const data = {
    nombre: document.getElementById('pNombre').value.trim(),
    email: document.getElementById('pEmail').value.trim(),
    telefono: document.getElementById('pTel').value.trim(),
    direccion: document.getElementById('pDir').value.trim(),
    nit_ci: document.getElementById('pNit').value.trim()
  };
  
  const res = await Andina.apiRequest('actualizar_perfil', data);
  if (res && res.exito) {
    const perfil = res.datos || data;
    const s = Andina.getSession();
    s.nombre = perfil.nombre; 
    s.email = perfil.email;
    s.telefono = perfil.telefono;
    s.direccion = perfil.direccion;
    s.nit_ci = perfil.nit_ci;
    Andina.setSession(s);
    
    // Actualizar la vista (Avatar card)
    document.getElementById('profileNombre').textContent = s.nombre;
    document.getElementById('profileEmail').textContent = s.email;
    const newInitials = s.nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('avatarCircle').textContent = newInitials;
    
    Andina.showToast('Perfil actualizado correctamente', 'success');
  } else {
    Andina.showToast(res?.error || 'Error al actualizar el perfil', 'error');
  }
});

async function cambiarPass(){
  const actual = document.getElementById('passActual').value;
  const nueva = document.getElementById('passNueva').value;
  const confirm = document.getElementById('passConfirm').value;
  if(!actual||!nueva){ Andina.showToast('Completa todos los campos','warning'); return; }
  if(nueva!==confirm){ Andina.showToast('Las contraseñas no coinciden','error'); return; }
  if(nueva.length<8){ Andina.showToast('Mínimo 8 caracteres','warning'); return; }
  await Andina.apiRequest('cambiar_password',{password_actual:actual,password_nueva:nueva});
  Andina.showToast('Contraseña actualizada correctamente','success');
  document.getElementById('passActual').value='';
  document.getElementById('passNueva').value='';
  document.getElementById('passConfirm').value='';
}
</script>
<script src="../assets/js/transitions.js"></script>
</body>
</html>
