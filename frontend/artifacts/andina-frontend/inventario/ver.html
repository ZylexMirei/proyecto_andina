<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0f1e">
  <style>html{background:#0a0f1e}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario — Distribuidora Andina SRL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="../assets/css/custom.css" rel="stylesheet">
</head>
<body>
<div id="sidebar"></div>
<div id="navbar"></div>
<div id="main-content">
  <div class="page-header">
    <div class="page-header-left">
      <h1 class="page-title"><i class="bi bi-clipboard2-data me-2"></i>Control de Inventario</h1>
      <p class="page-subtitle">Estado del stock en todos los almacenes</p>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <select class="form-select" id="filtroAlmacen" style="width:180px;">
        <option value="">Todos los almacenes</option>
        <option>Almacén Central</option><option>Almacén Norte</option><option>Almacén Sur</option>
      </select>
      <select class="form-select" id="filtroEstado" style="width:150px;">
        <option value="">Todos los estados</option>
        <option>Normal</option><option>Alerta</option><option>Crítico</option><option>Agotado</option>
      </select>
      <button class="btn btn-primary" id="btnMovimiento" data-role="Administrador,Gerente" onclick="abrirModalMovimiento()">
        <i class="bi bi-arrow-left-right me-1"></i>Registrar Movimiento
      </button>
    </div>
  </div>

  <!-- Resumen -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3"><div class="stat-card animate-card">
      <div class="stat-icon success"><i class="bi bi-check-circle"></i></div>
      <div class="stat-info"><div class="stat-number" id="countNormal">0</div><div class="stat-label">Stock normal</div></div>
    </div></div>
    <div class="col-6 col-md-3"><div class="stat-card animate-card">
      <div class="stat-icon warning"><i class="bi bi-exclamation-circle"></i></div>
      <div class="stat-info"><div class="stat-number" id="countAlerta">0</div><div class="stat-label">En alerta</div></div>
    </div></div>
    <div class="col-6 col-md-3"><div class="stat-card animate-card">
      <div class="stat-icon danger"><i class="bi bi-exclamation-triangle"></i></div>
      <div class="stat-info"><div class="stat-number" id="countCritico">0</div><div class="stat-label">Stock crítico</div></div>
    </div></div>
    <div class="col-6 col-md-3"><div class="stat-card animate-card">
      <div class="stat-icon primary"><i class="bi bi-x-circle"></i></div>
      <div class="stat-info"><div class="stat-number" id="countAgotado">0</div><div class="stat-label">Agotado</div></div>
    </div></div>
  </div>

  <!-- Pestañas (Tabs) de Inventario y Movimientos -->
  <div class="card">
    <div class="card-header p-0">
      <ul class="nav nav-tabs" role="tablist" style="padding:0 16px;border-bottom:none;">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabStock"><i class="bi bi-box-seam me-2"></i>Stock Actual</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabMovimientos"><i class="bi bi-clock-history me-2"></i>Historial de Movimientos</button></li>
      </ul>
    </div>
    <div class="card-body p-0">
      <div class="tab-content">
        <!-- Tab Stock Actual -->
        <div class="tab-pane fade show active" id="tabStock">
          <div class="table-responsive">
            <table id="tablaInventario" class="table table-striped mb-0 w-100">
              <thead><tr>
                <th>Código</th><th>Producto</th><th>Almacén</th><th>Stock actual</th>
                <th>Stock mín.</th><th>Stock máx.</th><th>Estado</th><th>Nivel</th>
              </tr></thead>
              <tbody id="tbodyInventario"></tbody>
            </table>
          </div>
        </div>
        <!-- Tab Historial de Movimientos -->
        <div class="tab-pane fade" id="tabMovimientos">
          <div class="table-responsive">
            <table id="tablaMovimientos" class="table table-striped mb-0 w-100">
              <thead><tr>
                <th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cant.</th><th>Almacén</th><th>Usuario</th><th>Observación</th>
              </tr></thead>
              <tbody id="tbodyMovimientos"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="page-footer"><span>© 2026 Distribuidora Andina SRL</span></footer>

<!-- Modal Movimiento -->
<div class="modal fade" id="modalMovimiento" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title"><i class="bi bi-arrow-left-right me-2"></i>Registrar Movimiento</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Tipo de movimiento *</label>
            <select class="form-select" id="tipoMovimiento">
              <option value="entrada">Entrada (ingreso de stock)</option>
              <option value="salida">Salida (consumo / ajuste)</option>
              <option value="traslado">Traslado entre almacenes</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Producto *</label>
            <select class="form-select" id="prodMovimiento">
              <option value="">Seleccionar producto...</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Cantidad *</label>
            <input type="number" class="form-control" id="cantMovimiento" placeholder="0" min="1">
          </div>
          <div class="col-md-6">
            <label class="form-label">Almacén *</label>
            <select class="form-select" id="almacenMovimiento">
              <option>Almacén Central</option><option>Almacén Norte</option><option>Almacén Sur</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Observaciones</label>
            <textarea class="form-control" id="obsMovimiento" rows="2" placeholder="Motivo del movimiento..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="guardarMovimiento()"><i class="bi bi-save me-1"></i>Registrar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const session = Andina.initPage({ activeKey:'inventario', pageTitle:'Inventario' });
if(!session) throw new Error('no session');

let inventarioData = [];
let movimientosData = [];

function updateCounters(data) {
  document.getElementById('countNormal').textContent = data.filter(p=>p.estado==='Normal').length;
  document.getElementById('countAlerta').textContent = data.filter(p=>p.estado==='Alerta').length;
  document.getElementById('countCritico').textContent = data.filter(p=>p.estado==='Crítico').length;
  document.getElementById('countAgotado').textContent = data.filter(p=>p.estado==='Agotado').length;
}

function renderInventario(data) {
  const tbody = document.getElementById('tbodyInventario');
  tbody.innerHTML = data.map(p => {
    const pct = Math.min(100, Math.max(0, (p.stock/p.stock_max)*100));
    const fillClass = p.estado==='Normal'?'normal':p.estado==='Alerta'?'alerta':'critico';
    return `<tr>
      <td><code style="font-size:12px;color:var(--primary);">${p.codigo}</code></td>
      <td><strong style="font-size:13px; color:var(--text);">${p.nombre}</strong></td>
      <td><i class="bi bi-geo-alt me-1 text-muted"></i>${p.almacen}</td>
      <td><span style="font-size:15px;font-weight:700;color:${p.stock===0?'#dc3545':p.stock<p.stock_min?'#d97706':'#28a745'}">${p.stock}</span></td>
      <td>${p.stock_min}</td>
      <td>${p.stock_max}</td>
      <td>${Andina.getBadgeEstado(p.estado)}</td>
      <td style="min-width:120px;"><div class="stock-bar"><div class="stock-fill ${fillClass}" style="width:${pct}%"></div></div><div style="font-size:11px;color:#718096;margin-top:2px;">${pct.toFixed(0)}% del máximo</div></td>
    </tr>`;
  }).join('');

  if($.fn.DataTable.isDataTable('#tablaInventario')) $('#tablaInventario').DataTable().destroy();
  $('#tablaInventario').DataTable({ language:{url:'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'}, order:[[0,'asc']], pageLength:10 });
}

function renderMovimientos(data) {
  const tbody = document.getElementById('tbodyMovimientos');
  tbody.innerHTML = data.map(m => {
    const isSalida = m.tipo.toLowerCase() === 'salida';
    const tipoBadge = m.tipo.toLowerCase() === 'entrada' ? '<span class="badge badge-completado"><i class="bi bi-arrow-down-left-circle me-1"></i>Entrada</span>' :
                      isSalida ? '<span class="badge badge-critico"><i class="bi bi-arrow-up-right-circle me-1"></i>Salida</span>' :
                      '<span class="badge badge-alerta"><i class="bi bi-arrow-left-right me-1"></i>Traslado</span>';
    
    let almacen = m.almacen_origen_nombre || '-';
    if(m.tipo.toLowerCase() === 'traslado' && m.almacen_destino_nombre) almacen += ` <i class="bi bi-arrow-right mx-1"></i> ${m.almacen_destino_nombre}`;

    return `<tr>
      <td style="font-size:12px;color:#718096;">${Andina.formatDateTime(m.fecha_hora)}</td>
      <td><code style="font-size:12px;color:var(--primary);">${m.producto_codigo}</code> <strong style="font-size:13px;color:var(--text);">${m.producto_nombre}</strong></td>
      <td>${tipoBadge}</td>
      <td><strong style="font-size:14px;color:${isSalida?'#dc3545':'#28a745'};">${isSalida?'-':'+'}${m.cantidad}</strong></td>
      <td style="font-size:13px;"><i class="bi bi-geo-alt text-muted me-1"></i>${almacen}</td>
      <td><code style="font-size:12px;">@${m.responsable_username || 'sistema'}</code></td>
      <td style="font-size:12.5px;color:#718096;max-width:200px;" class="text-truncate" title="${m.observacion || ''}">${m.observacion || '-'}</td>
    </tr>`;
  }).join('');
  if($.fn.DataTable.isDataTable('#tablaMovimientos')) $('#tablaMovimientos').DataTable().destroy();
  $('#tablaMovimientos').DataTable({ language:{url:'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'}, order:[[0,'desc']], pageLength:10 });
}

// Ocultar botón movimiento para empleados
if(session.rol==='Empleado') document.getElementById('btnMovimiento').style.display='none';

async function cargarDatosReales() {
  document.getElementById('tbodyInventario').innerHTML = '<tr><td colspan="8" class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary me-2"></span>Cargando inventario...</td></tr>';
  document.getElementById('tbodyMovimientos').innerHTML = '<tr><td colspan="7" class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary me-2"></span>Cargando historial...</td></tr>';
  
  const resInv = await Andina.apiRequest('inventario', {}, 'GET');
  if (resInv.exito) {
    inventarioData = resInv.inventario.map(i => ({
      id: i.id_inventario, codigo: i.codigo, nombre: i.producto, almacen: i.almacen,
      stock: parseInt(i.cantidad_actual), stock_min: parseInt(i.stock_minimo), stock_max: parseInt(i.stock_maximo),
      estado: i.estado === 'CRITICO' ? 'Crítico' : i.estado === 'AGOTADO' ? 'Agotado' : i.estado === 'ALERTA' ? 'Alerta' : 'Normal'
    }));
    updateCounters(inventarioData);
    renderInventario(inventarioData);
    
    // Rellenar Filtro de Almacenes superior dinámicamente
    const almacenes = [...new Set(inventarioData.map(i => i.almacen))].sort();
    document.getElementById('filtroAlmacen').innerHTML = '<option value="">Todos los almacenes</option>' + almacenes.map(a => `<option value="${a}">${a}</option>`).join('');
  } else {
    document.getElementById('tbodyInventario').innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Error: ${resInv.error}</td></tr>`;
  }

  // Poblar Modal: Productos
  const selProd = document.getElementById('prodMovimiento');
  selProd.innerHTML = '<option value="">Seleccionar producto...</option>';
  const resProd = await Andina.apiRequest('listar_productos', {}, 'GET');
  if (resProd.exito) {
    resProd.productos.forEach(p => selProd.innerHTML += `<option value="${p.id_producto}">${p.codigo} — ${p.nombre}</option>`);
  }

  // Poblar Modal: Almacenes
  const selAlm = document.getElementById('almacenMovimiento');
  selAlm.innerHTML = '';
  const resAlm = await Andina.apiRequest('listar_almacenes', {}, 'GET');
  if (resAlm.exito) {
    resAlm.almacenes.forEach(a => selAlm.innerHTML += `<option value="${a.id_almacen}">${a.nombre}</option>`);
  }

  // Poblar Historial de Movimientos
  const resMov = await Andina.apiRequest('listar_movimientos', {}, 'GET');
  if (resMov.exito) {
    movimientosData = resMov.movimientos;
    renderMovimientos(movimientosData);
  }
}

// Iniciar carga automática
cargarDatosReales();

// Filtros
function aplicarFiltros() {
  const est = document.getElementById('filtroEstado').value;
  const alm = document.getElementById('filtroAlmacen').value;
  let filtrado = inventarioData;
  if (est) filtrado = filtrado.filter(p => p.estado === est);
  if (alm) filtrado = filtrado.filter(p => p.almacen === alm);
  updateCounters(filtrado);
  renderInventario(filtrado);
}
document.getElementById('filtroEstado').addEventListener('change', aplicarFiltros);
document.getElementById('filtroAlmacen').addEventListener('change', aplicarFiltros);

function abrirModalMovimiento() {
  document.getElementById('cantMovimiento').value = '';
  document.getElementById('obsMovimiento').value = '';
  new bootstrap.Modal(document.getElementById('modalMovimiento')).show();
}

async function guardarMovimiento() {
  const prod=document.getElementById('prodMovimiento').value;
  const cant=document.getElementById('cantMovimiento').value;
  const tipo=document.getElementById('tipoMovimiento').value;
  const almacen=document.getElementById('almacenMovimiento').value;
  if(!prod||!cant||cant<=0){ Andina.showToast('Completa los campos requeridos','warning'); return; }
  
  const res = await Andina.apiRequest('registrar_movimiento',{
    producto_id: prod, cantidad: parseInt(cant),
    tipo: tipo, almacen: almacen,
    observaciones:document.getElementById('obsMovimiento').value,
  });
  
  if (res.exito) {
    bootstrap.Modal.getInstance(document.getElementById('modalMovimiento')).hide();
    Andina.showToast(res.mensaje, 'success');
    cargarDatosReales(); // Recargar tabla al instante
  } else {
    Andina.showToast(res.error, 'error');
  }
}
</script>
<script src="../assets/js/transitions.js"></script>
</body>
</html>
