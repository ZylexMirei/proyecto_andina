<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0f1e">
  <style>html{background:#0a0f1e}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — Distribuidora Andina SRL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="../assets/css/custom.css" rel="stylesheet">
</head>
<body>
<div id="sidebar"></div>
<div id="navbar"></div>
<div id="main-content">
  <div class="page-header">
    <div class="page-header-left">
      <h1 class="page-title"><i class="bi bi-box-seam me-2"></i>Catálogo de Productos</h1>
      <p class="page-subtitle">Gestión del portafolio de productos disponibles</p>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <div class="input-group" style="width:220px;">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" id="buscador" placeholder="Buscar producto...">
      </div>
      <select class="form-select" id="filtroCategoria" style="width:160px;">
        <option value="">Todas las categorías</option>
        <option>Lácteos</option><option>Bebidas</option><option>Granos</option>
        <option>Aceites</option><option>Dulces</option><option>Condimentos</option><option>Pastas</option>
      </select>
      <a href="crear.html" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo Producto</a>
    </div>
  </div>

  <!-- Vista Tabla (Admin/Gerente) -->
  <div id="vistaTabla">
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table id="tablaProductos" class="table table-striped mb-0 w-100">
            <thead><tr>
              <th>Código</th><th>Producto</th><th>Categoría</th><th>Precio</th>
              <th>Stock</th><th>Estado</th><th>Acciones</th>
            </tr></thead>
            <tbody id="tbodyProductos"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Vista Grid (Empleado) -->
  <div id="vistaGrid" class="d-none">
    <div class="row g-3" id="gridProductos"></div>
  </div>
</div>

<footer class="page-footer"><span>© 2026 Distribuidora Andina SRL</span></footer>

<!-- Modal detalle -->
<div class="modal fade" id="modalDetalle" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Detalle del Producto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="detalleBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/productos.js"></script>
<script src="../assets/js/transitions.js"></script>
</body>
</html>
