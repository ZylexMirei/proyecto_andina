<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0f1e">
  <style>html{background:#0a0f1e}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — Distribuidora Andina SRL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="../assets/css/custom.css" rel="stylesheet">
</head>
<body>
<div id="sidebar"></div>
<div id="navbar"></div>
<div id="main-content">
  <div class="page-header">
    <div class="page-header-left">
      <h1 class="page-title"><i class="bi bi-bar-chart-line me-2"></i>Centro de Reportes</h1>
      <p class="page-subtitle">Análisis y exportación de datos del sistema</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-danger" onclick="exportarPDF()"><i class="bi bi-file-earmark-pdf me-1"></i>Exportar PDF</button>
      <button class="btn btn-outline-info" onclick="exportarCSV()"><i class="bi bi-filetype-csv me-1"></i>Exportar CSV</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="card mb-4">
    <div class="card-header"><i class="bi bi-funnel me-2"></i>Filtros del reporte</div>
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Tipo de reporte</label>
          <select class="form-select" id="tipoReporte" onchange="generarReporte()">
            <option value="inventario">Reporte de Inventario</option>
            <option value="pedidos">Reporte de Pedidos</option>
            <option value="ventas">Ventas por Producto</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Fecha desde</label>
          <input type="date" class="form-control" id="fechaDesde">
        </div>
        <div class="col-md-3">
          <label class="form-label">Fecha hasta</label>
          <input type="date" class="form-control" id="fechaHasta">
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="generarReporte()">
            <i class="bi bi-search me-1"></i>Generar reporte
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="row g-3 mb-4" id="kpisRow"></div>

  <!-- Gráfica -->
  <div class="row g-3 mb-4">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header" id="chartTitle"><i class="bi bi-bar-chart me-2"></i>Gráfico</div>
        <div class="card-body"><div class="chart-container"><canvas id="chartReporte"></canvas></div></div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card h-100">
        <div class="card-header"><i class="bi bi-pie-chart me-2"></i>Distribución</div>
        <div class="card-body"><div class="chart-container"><canvas id="chartDistrib"></canvas></div></div>
      </div>
    </div>
  </div>

  <!-- Tabla de resultados -->
  <div class="card">
    <div class="card-header" id="tablaTitle"><i class="bi bi-table me-2"></i>Resultados</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table id="tablaReporte" class="table table-striped mb-0 w-100">
          <thead id="theadReporte"></thead>
          <tbody id="tbodyReporte"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<footer class="page-footer"><span>© 2026 Distribuidora Andina SRL</span></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const session = Andina.initPage({ activeKey:'reportes', pageTitle:'Reportes' });
if(!session) throw new Error('no session');

const hoy = new Date();
const hace30 = new Date(hoy - 30*24*60*60*1000);
document.getElementById('fechaDesde').value = hace30.toISOString().split('T')[0];
document.getElementById('fechaHasta').value = hoy.toISOString().split('T')[0];

let chartReporte = null, chartDistrib = null;

function generarReporte() {
  const tipo = document.getElementById('tipoReporte').value;
  if(chartReporte) chartReporte.destroy();
  if(chartDistrib) chartDistrib.destroy();
  if($.fn.DataTable.isDataTable('#tablaReporte')) $('#tablaReporte').DataTable().destroy();

  if(tipo==='inventario') renderInventarioReport();
  else if(tipo==='pedidos') renderPedidosReport();
  else renderVentasReport();
}

function renderInventarioReport() {
  document.getElementById('chartTitle').innerHTML='<i class="bi bi-bar-chart me-2"></i>Stock por producto';
  document.getElementById('tablaTitle').innerHTML='<i class="bi bi-table me-2"></i>Inventario completo';
  const prods = [];

  document.getElementById('kpisRow').innerHTML = `
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon success"><i class="bi bi-boxes"></i></div><div class="stat-info"><div class="stat-number">${prods.reduce((a,b)=>a+b.stock,0)}</div><div class="stat-label">Unidades en stock</div></div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon primary"><i class="bi bi-box-seam"></i></div><div class="stat-info"><div class="stat-number">${prods.length}</div><div class="stat-label">Total productos</div></div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon warning"><i class="bi bi-exclamation-triangle"></i></div><div class="stat-info"><div class="stat-number">${prods.filter(p=>p.estado!=='Normal').length}</div><div class="stat-label">En alerta</div></div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon accent"><i class="bi bi-currency-dollar"></i></div><div class="stat-info"><div class="stat-number">${Andina.formatBs(prods.reduce((a,b)=>a+(b.stock*b.precio),0))}</div><div class="stat-label">Valor del inventario</div></div></div></div>`;

  const ctx = document.getElementById('chartReporte').getContext('2d');
  chartReporte = new Chart(ctx, { type:'bar', data:{ labels:prods.map(p=>p.nombre.substring(0,15)+'...'), datasets:[{label:'Stock actual',data:prods.map(p=>p.stock),backgroundColor:'rgba(26,58,92,0.8)',borderRadius:6},{label:'Stock mínimo',data:prods.map(p=>p.stock_min),backgroundColor:'rgba(220,53,69,0.4)',borderRadius:6}] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top'}}, scales:{y:{beginAtZero:true, grid:{color:'#f0f4f8'}}, x:{ticks:{font:{size:11}}, grid:{display:false}}} } });

  const ctx2 = document.getElementById('chartDistrib').getContext('2d');
  const estados = {Normal:0,Alerta:0,Crítico:0,Agotado:0}; prods.forEach(p=>estados[p.estado]=(estados[p.estado]||0)+1);
  chartDistrib = new Chart(ctx2, { type:'doughnut', data:{ labels:Object.keys(estados), datasets:[{data:Object.values(estados),backgroundColor:['#28a745','#ffc107','#dc3545','#6c757d'],borderWidth:0}] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} } });

  document.getElementById('theadReporte').innerHTML='<tr><th>Código</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Mín.</th><th>Estado</th><th>Valor</th></tr>';
  document.getElementById('tbodyReporte').innerHTML = prods.map(p=>`<tr><td><code style="font-size:12px;">${p.codigo}</code></td><td><strong>${p.nombre}</strong></td><td>${p.categoria}</td><td>${p.stock}</td><td>${p.stock_min}</td><td>${Andina.getBadgeEstado(p.estado)}</td><td><strong>${Andina.formatBs(p.stock*p.precio)}</strong></td></tr>`).join('');
  $('#tablaReporte').DataTable({ language:{url:'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'}, order:[[3,'asc']], pageLength:10 });
}

function renderPedidosReport() {
  const pedidos = [];
  document.getElementById('kpisRow').innerHTML=`
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon primary"><i class="bi bi-receipt"></i></div><div class="stat-info"><div class="stat-number">${pedidos.length}</div><div class="stat-label">Total pedidos</div></div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon success"><i class="bi bi-check-circle"></i></div><div class="stat-info"><div class="stat-number">${pedidos.filter(p=>p.estado==='Completado').length}</div><div class="stat-label">Completados</div></div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon warning"><i class="bi bi-clock"></i></div><div class="stat-info"><div class="stat-number">${pedidos.filter(p=>p.estado==='Pendiente').length}</div><div class="stat-label">Pendientes</div></div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon accent"><i class="bi bi-currency-dollar"></i></div><div class="stat-info"><div class="stat-number">${Andina.formatBs(pedidos.reduce((a,b)=>a+b.total,0))}</div><div class="stat-label">Ventas totales</div></div></div></div>`;
  const ctx=document.getElementById('chartReporte').getContext('2d');
  chartReporte=new Chart(ctx,{type:'bar',data:{labels:pedidos.map(p=>p.codigo),datasets:[{label:'Total (Bs.)',data:pedidos.map(p=>p.total),backgroundColor:'rgba(0,168,89,0.8)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true,grid:{color:'#f0f4f8'},ticks:{callback:v=>'Bs.'+v.toLocaleString('es-BO')}},x:{grid:{display:false}}}}});
  const ctx2=document.getElementById('chartDistrib').getContext('2d');
  chartDistrib=new Chart(ctx2,{type:'doughnut',data:{labels:['Completado','Pendiente','En tránsito'],datasets:[{data:[pedidos.filter(p=>p.estado==='Completado').length,pedidos.filter(p=>p.estado==='Pendiente').length,pedidos.filter(p=>p.estado==='En tránsito').length],backgroundColor:['#28a745','#ffc107','#0d6efd'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
  document.getElementById('theadReporte').innerHTML='<tr><th>Código</th><th>Cliente</th><th>Fecha</th><th>Estado</th><th>Total</th><th>Creado por</th></tr>';
  document.getElementById('tbodyReporte').innerHTML=pedidos.map(p=>`<tr><td><code style="font-size:12px;">${p.codigo}</code></td><td>${p.cliente}</td><td>${Andina.formatFechaCorta(p.fecha)}</td><td>${Andina.getBadgeEstado(p.estado)}</td><td><strong>${Andina.formatBs(p.total)}</strong></td><td>${p.creado_por}</td></tr>`).join('');
  $('#tablaReporte').DataTable({language:{url:'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'},order:[[2,'desc']],pageLength:10});
}

function renderVentasReport() {
  const prods=[];
  document.getElementById('kpisRow').innerHTML=`<div class="col-md-4"><div class="stat-card"><div class="stat-icon primary"><i class="bi bi-box-seam"></i></div><div class="stat-info"><div class="stat-number">${prods.length}</div><div class="stat-label">Productos en catálogo</div></div></div></div><div class="col-md-4"><div class="stat-card"><div class="stat-icon accent"><i class="bi bi-currency-dollar"></i></div><div class="stat-info"><div class="stat-number">${Andina.formatBs(prods.reduce((a,b)=>a+(b.precio*10),0))}</div><div class="stat-label">Ventas reales</div></div></div></div><div class="col-md-4"><div class="stat-card"><div class="stat-icon success"><i class="bi bi-graph-up"></i></div><div class="stat-info"><div class="stat-number">0%</div><div class="stat-label">Crecimiento mensual</div></div></div></div>`;
  const ctx=document.getElementById('chartReporte').getContext('2d');
  chartReporte=new Chart(ctx,{type:'bar',data:{labels:prods.map(p=>p.nombre.substring(0,12)+'...'),datasets:[{label:'Unidades vendidas',data:prods.map(_=>0),backgroundColor:'rgba(26,58,92,0.8)',borderRadius:6},{label:'Ingresos (Bs.)',data:prods.map(_=>0),backgroundColor:'rgba(0,168,89,0.6)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true,grid:{color:'#f0f4f8'}},x:{grid:{display:false}}}}});
  const ctx2=document.getElementById('chartDistrib').getContext('2d');
  const cats={};prods.forEach(p=>cats[p.categoria]=(cats[p.categoria]||0)+1);
  chartDistrib=new Chart(ctx2,{type:'pie',data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats),backgroundColor:['#1a3a5c','#00a859','#ffc107','#dc3545','#0d6efd','#6c757d','#fd7e14'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
  document.getElementById('theadReporte').innerHTML='<tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Uds. vendidas</th><th>Ingresos</th></tr>';
  document.getElementById('tbodyReporte').innerHTML=prods.map(p=>{const uds=0;return`<tr><td><strong>${p.nombre}</strong></td><td><span class="badge" style="background:var(--secondary);color:var(--primary);">${p.categoria}</span></td><td>${Andina.formatBs(p.precio)}</td><td>${uds}</td><td><strong>${Andina.formatBs(p.precio*uds)}</strong></td></tr>`;}).join('');
  $('#tablaReporte').DataTable({language:{url:'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'},order:[[3,'desc']],pageLength:10});
}

function exportarPDF() {
  const tipo = document.getElementById('tipoReporte').value;
  const fechaDesde = document.getElementById('fechaDesde').value;
  const fechaHasta = document.getElementById('fechaHasta').value;
  const url = `/backend/modules/reportes/exportar_pdf.php?tipo=${tipo}&fecha_desde=${fechaDesde}&fecha_hasta=${fechaHasta}`;

  const win = window.open(url, '_blank');
  if (!win) {
    Andina.showToast('No se pudo abrir la ventana para el reporte. Revisa el bloqueador de ventanas emergentes.','error');
    return;
  }

  win.focus();
  Andina.showToast('Reporte abierto en nueva pestaña. Usa imprimir para guardar como PDF.','success');
}

function exportarCSV() {
  const tipo = document.getElementById('tipoReporte').value;
  const escapeCsv = value => '"' + String(value).replace(/"/g, '""') + '"';
  const headers = document.querySelectorAll('#theadReporte th');
  const rows = [ [...headers].map(th => escapeCsv(th.textContent.trim())).join(',') ];

  document.querySelectorAll('#tbodyReporte tr').forEach(tr => {
    const cols = [...tr.querySelectorAll('td')].map(td => escapeCsv(td.innerText.trim()));
    rows.push(cols.join(','));
  });

  const content = '\ufeff' + rows.join('\r\n');
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `reporte_andina_${tipo}_${new Date().toISOString().split('T')[0]}.csv`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  Andina.showToast('CSV descargado correctamente','success');
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function formatReporteValue(value, header) {
  const textHeader = String(header || '').toLowerCase();
  if (textHeader.includes('valor') || textHeader.includes('total') || textHeader.includes('ingresos') || textHeader.includes('precio')) {
    return Andina.formatBs(value);
  }
  if (textHeader.includes('fecha')) return Andina.formatFechaCorta(value);
  return escapeHtml(value);
}

function renderKpisReales(kpis) {
  document.getElementById('kpisRow').innerHTML = (kpis || []).map(kpi => `
    <div class="col-md-3">
      <div class="stat-card">
        <div class="stat-icon ${escapeHtml(kpi.type || 'primary')}"><i class="bi ${escapeHtml(kpi.icon || 'bi-graph-up')}"></i></div>
        <div class="stat-info">
          <div class="stat-number">${kpi.format === 'money' ? Andina.formatBs(kpi.value) : escapeHtml(kpi.value)}</div>
          <div class="stat-label">${escapeHtml(kpi.label)}</div>
        </div>
      </div>
    </div>`).join('');
}

function renderTablaReal(reporte) {
  document.getElementById('tablaTitle').innerHTML = `<i class="bi bi-table me-2"></i>${escapeHtml(reporte.titulo || 'Resultados')}`;
  document.getElementById('theadReporte').innerHTML = `<tr>${reporte.headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr>`;
  document.getElementById('tbodyReporte').innerHTML = (reporte.rows || []).map(row => `
    <tr>${row.map((value, index) => {
      const header = reporte.headers[index] || '';
      const lower = String(header).toLowerCase();
      if (lower.includes('estado')) return `<td>${Andina.getBadgeEstado(value)}</td>`;
      if (lower.includes('codigo')) return `<td><code style="font-size:12px;">${escapeHtml(value)}</code></td>`;
      if (index === 1) return `<td><strong>${escapeHtml(value)}</strong></td>`;
      return `<td>${formatReporteValue(value, header)}</td>`;
    }).join('')}</tr>`).join('');

  $('#tablaReporte').DataTable({
    language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' },
    pageLength: 10,
    order: [],
  });
}

function renderGraficasReales(reporte) {
  document.getElementById('chartTitle').innerHTML = `<i class="bi bi-bar-chart me-2"></i>${escapeHtml(reporte.chart?.title || 'Grafico')}`;
  const labels = reporte.chart?.labels || [];
  const palette = ['rgba(26,58,92,0.85)', 'rgba(0,168,89,0.68)', 'rgba(255,193,7,0.68)'];
  const datasets = (reporte.chart?.datasets || []).map((dataset, index) => ({
    label: dataset.label,
    data: dataset.data,
    backgroundColor: palette[index % palette.length],
    borderRadius: 6,
  }));

  chartReporte = new Chart(document.getElementById('chartReporte').getContext('2d'), {
    type: reporte.chart?.type || 'bar',
    data: { labels: labels.map(label => String(label).length > 18 ? String(label).slice(0, 18) + '...' : label), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'top' } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f0f4f8' } },
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
      },
    },
  });

  chartDistrib = new Chart(document.getElementById('chartDistrib').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: reporte.distribution?.labels || [],
      datasets: [{
        data: reporte.distribution?.data || [],
        backgroundColor: ['#28a745', '#ffc107', '#dc3545', '#6c757d', '#0d6efd', '#00a859', '#1a3a5c'],
        borderWidth: 0,
      }],
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
  });
}

generarReporte = async function() {
  const tipo = document.getElementById('tipoReporte').value;
  const fechaDesde = document.getElementById('fechaDesde').value;
  const fechaHasta = document.getElementById('fechaHasta').value;

  if (chartReporte) chartReporte.destroy();
  if (chartDistrib) chartDistrib.destroy();
  if ($.fn.DataTable.isDataTable('#tablaReporte')) $('#tablaReporte').DataTable().destroy();

  document.getElementById('kpisRow').innerHTML = '<div class="col-12 text-center py-4 text-muted">Cargando reporte...</div>';
  document.getElementById('tbodyReporte').innerHTML = '';

  const res = await Andina.apiRequest(`reporte_datos&tipo=${encodeURIComponent(tipo)}&fecha_desde=${encodeURIComponent(fechaDesde)}&fecha_hasta=${encodeURIComponent(fechaHasta)}`, {}, 'GET');
  if (!res.exito || !res.reporte) {
    Andina.showToast(res.error || 'No se pudo generar el reporte', 'error');
    document.getElementById('kpisRow').innerHTML = '<div class="col-12 text-center py-4 text-danger">No se pudo cargar el reporte.</div>';
    return;
  }

  renderKpisReales(res.reporte.kpis);
  renderGraficasReales(res.reporte);
  renderTablaReal(res.reporte);
};

exportarCSV = function() {
  const tipo = document.getElementById('tipoReporte').value;
  const fechaDesde = document.getElementById('fechaDesde').value;
  const fechaHasta = document.getElementById('fechaHasta').value;
  const sessionToken = encodeURIComponent(session.token || '');
  window.location.href = `/test_api.php?accion=exportar_reporte_csv&tipo=${encodeURIComponent(tipo)}&fecha_desde=${encodeURIComponent(fechaDesde)}&fecha_hasta=${encodeURIComponent(fechaHasta)}&id_usuario=${encodeURIComponent(session.id_usuario || '')}&token=${sessionToken}`;
  Andina.showToast('Descargando CSV ordenado...', 'success');
};

// Generar reporte inicial
generarReporte();
</script>
<script src="../assets/js/transitions.js"></script>
</body>
</html>
